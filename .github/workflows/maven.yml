name: CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # Runs the full Maven verification for the backend.
    - name: Build and Verify Backend
      run: mvn -B verify

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: backend/target/site/jacoco/jacoco.xml

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Dependencies
      run: npm ci

    # Fails fast on unused imports, broken rules, and bad code style.
    - name: Lint Frontend
      env:
        NODE_OPTIONS: '--max-old-space-size=4096'
      run: npm run lint

    # Ensures all TypeScript types are consistent and correct.
    - name: Typecheck Frontend
      env:
        NODE_OPTIONS: '--max-old-space-size=4096'
      run: npm run typecheck

    # Verifies that the production bundle compiles successfully.
    - name: Build Frontend
      env:
        NODE_OPTIONS: '--max-old-space-size=4096'
      run: npm run build

    # Runs frontend tests and generates the coverage report.
    - name: Test Frontend With Coverage
      env:
        NODE_OPTIONS: '--max-old-space-size=4096'
      run: npm run coverage

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: frontend/coverage/lcov.info
