name: Publish Docker Images

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: >
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      ) ||
      (
        github.event_name == 'workflow_dispatch' &&
        github.ref == 'refs/heads/main'
      )
    outputs:
      owner_lc: ${{ steps.vars.outputs.owner_lc }}
    steps:
      - name: Normalize owner name for GHCR
        id: vars
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

  backend-image:
    runs-on: ubuntu-latest
    needs: prepare
    if: >
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      ) ||
      (
        github.event_name == 'workflow_dispatch' &&
        github.ref == 'refs/heads/main'
      )
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract backend image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ needs.prepare.outputs.owner_lc }}/mybooktracker-backend
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend-image:
    runs-on: ubuntu-latest
    needs: prepare
    if: >
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      ) ||
      (
        github.event_name == 'workflow_dispatch' &&
        github.ref == 'refs/heads/main'
      )
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract frontend image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ needs.prepare.outputs.owner_lc }}/mybooktracker-frontend
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-production:
    runs-on: ubuntu-latest
    needs:
      - backend-image
      - frontend-image
    if: >
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      ) ||
      (
        github.event_name == 'workflow_dispatch' &&
        github.ref == 'refs/heads/main'
      )
    env:
      DEPLOY_HOST: ${{ secrets.HETZNER_DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.HETZNER_DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.HETZNER_DEPLOY_PORT }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_DEPLOY_SSH_KEY }}

      - name: Add Hetzner host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Sync production compose file to Hetzner
        run: |
          scp -P "${DEPLOY_PORT:-22}" docker-compose.prod.yml "${DEPLOY_USER}@${DEPLOY_HOST}:/opt/mybooktracker/docker-compose.prod.yml"

      - name: Deploy tagged images on Hetzner
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" '
            set -e
            cd /opt/mybooktracker
            export DEPLOY_IMAGE_TAG=sha-${{ github.event.workflow_run.head_sha || github.sha }}

            # Save current IMAGE_TAG for rollback
            PREV_IMAGE_TAG=""
            if grep -q "^IMAGE_TAG=" .env; then
              PREV_IMAGE_TAG=$(grep "^IMAGE_TAG=" .env | cut -d= -f2)
              sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${DEPLOY_IMAGE_TAG}/" .env
            else
              printf "\nIMAGE_TAG=%s\n" "${DEPLOY_IMAGE_TAG}" >> .env
            fi

            docker compose --env-file .env -f docker-compose.prod.yml pull
            docker compose --env-file .env -f docker-compose.prod.yml up -d --remove-orphans

            HEALTHY=true
            for service in app frontend; do
              container_id=$(docker compose --env-file .env -f docker-compose.prod.yml ps -q "$service")
              if [ -z "$container_id" ]; then
                echo "Missing container for $service"
                HEALTHY=false
                break
              fi

              attempt=0
              until [ "$(docker inspect --format '\''{{if .State.Health}}{{.State.Health.Status}}{{else}}starting{{end}}'\'' "$container_id")" = "healthy" ]; do
                attempt=$((attempt + 1))
                if [ "$attempt" -ge 24 ]; then
                  echo "$service did not become healthy in time"
                  docker logs "$container_id" --tail 50
                  HEALTHY=false
                  break 2
                fi
                sleep 5
              done
            done

            if [ "$HEALTHY" = "false" ] && [ -n "$PREV_IMAGE_TAG" ]; then
              echo "Deployment failed — rolling back to ${PREV_IMAGE_TAG}"
              sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${PREV_IMAGE_TAG}/" .env
              docker compose --env-file .env -f docker-compose.prod.yml pull
              docker compose --env-file .env -f docker-compose.prod.yml up -d --remove-orphans
              exit 1
            elif [ "$HEALTHY" = "false" ]; then
              echo "Deployment failed and no previous version available for rollback"
              exit 1
            fi

            docker compose --env-file .env -f docker-compose.prod.yml ps
          '
