name: Auto PR on Push

on:
  push:
    branches:
      - dev

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Create PR for latest commit
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          SHORT_SHA=$(git rev-parse --short HEAD)
          BRANCH="review/${SHORT_SHA}"

          git checkout -b "$BRANCH"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$COMMIT_MSG" \
            --body "Auto-generated PR for commit \`${SHORT_SHA}\`: ${COMMIT_MSG}"
