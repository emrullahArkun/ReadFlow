name: Auto PR on Push

on:
  push:
    branches:
      - dev
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Uses PAT_TOKEN so the PR triggers other workflows (e.g. maven.yml)
      - name: Create or update PR from dev to main
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git fetch origin main

          # Skip if dev and main have no differences
          if git diff --quiet origin/main..HEAD; then
            echo "No differences between dev and main, skipping."
            exit 0
          fi

          EXISTING_PR=$(gh pr list --base main --head dev --state open --json number --jq '.[0].number // empty')

          # Collect commit messages since main
          COMMITS=$(git log origin/main..HEAD --pretty=format:"- %s" --reverse)
          LATEST_SUBJECT=$(git log -1 --pretty=format:"%s")

          BODY="## Changes"$'\n\n'"$COMMITS"

          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists, updating body."
            gh pr edit "$EXISTING_PR" \
              --title "$LATEST_SUBJECT" \
              --body "$BODY"
          else
            gh pr create \
              --base main \
              --head dev \
              --title "$LATEST_SUBJECT" \
              --body "$BODY"
          fi
