services:
  app:
    build: ./backend # TODO: Replace with pre-built image from CI/CD pipeline (e.g. image: ghcr.io/emrullaharkun/chapterflow-backend:latest)
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/chapterflow
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - APP_JWT_SECRET=${APP_JWT_SECRET}
      - APP_CORS_ORIGINS=${APP_CORS_ORIGINS}
    restart: always

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=chapterflow
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - FRONTEND_ACCESS_MODE=${FRONTEND_ACCESS_MODE:-beta}
      - FRONTEND_BASIC_AUTH_REALM=${FRONTEND_BASIC_AUTH_REALM:-ChapterFlow Beta}
    volumes:
      - ./ops/nginx:/etc/nginx/ops:ro
    depends_on:
      - app
    restart: always

volumes:
  postgres_data:
