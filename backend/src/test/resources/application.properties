# Testcontainers PostgreSQL
spring.datasource.url=jdbc:tc:postgresql:16-alpine:///testdb
spring.datasource.driverClassName=org.testcontainers.jdbc.ContainerDatabaseDriver
spring.datasource.username=test
spring.datasource.password=test

# Let Flyway handle schema (consistent with production)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.jpa.hibernate.ddl-auto=validate

# Show SQL logs for debugging tests
spring.jpa.show-sql=true

# JWT Configuration (Test Secret)
app.jwt.secret=TEST_SECRET_FOR_JUNIT_TESTS_MUST_BE_LONG_ENOUGH_32_CHARS
app.jwt.ttl-seconds=3600

# CORS Configuration
app.cors.allowed-origins=http://localhost:5173
