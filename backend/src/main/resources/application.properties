spring.application.name=mybooktracker
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Jackson
spring.jackson.datatype.datetime.write-dates-as-timestamps=false

# Health checks
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.ttl-seconds=${APP_JWT_TTL_SECONDS:900}
app.jwt.issuer=${APP_JWT_ISSUER:mybooktracker}

# Dev bootstrap
app.dev.admin.email=${APP_DEV_ADMIN_EMAIL:admin@example.com}
app.dev.admin.password=${APP_DEV_ADMIN_PASSWORD:AdminPassword123}

# Flyway
spring.flyway.baseline-on-migrate=true

# Discovery provider
app.discovery.provider=${APP_DISCOVERY_PROVIDER:google-books}

# Google Books API
app.google-books.base-url=${APP_GOOGLE_BOOKS_BASE_URL:https://www.googleapis.com/books/v1}
app.google-books.api-key=${APP_GOOGLE_BOOKS_API_KEY:}

# Open Library API (inactive fallback adapter)
app.openlibrary.user-agent=MyBookTracker (mybooktracker@example.com)
