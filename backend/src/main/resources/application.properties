spring.application.name=readwick
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.ttl-seconds=3600


# Flyway
spring.flyway.baseline-on-migrate=true

# Discovery provider
app.discovery.provider=${APP_DISCOVERY_PROVIDER:google-books}

# Google Books API
app.google-books.base-url=${APP_GOOGLE_BOOKS_BASE_URL:https://www.googleapis.com/books/v1}
app.google-books.api-key=${APP_GOOGLE_BOOKS_API_KEY:}

# Open Library API (inactive fallback adapter)
app.openlibrary.user-agent=ReadWick (readwick@example.com)
